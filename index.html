<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Lite Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0f1a14;
            --surface:   #162010;
            --card:      #1e2d1a;
            --accent:    #6fcf72;
            --accent2:   #3a8c60;
            --user-bg:   #2a4a2e;
            --bot-bg:    #1a2f20;
            --text:      #e8f0e4;
            --muted:     #7a9a78;
            --border:    #2a3d26;
            --header-h:  64px;
            --input-h:   70px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 620px;
            height: 92vh;
            max-height: 860px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(111,207,114,0.06);
        }

        /* ── Header ── */
        .chat-header {
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .header-info { flex: 1; }

        .header-info h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--text);
            line-height: 1.2;
        }

        .header-info span {
            font-size: 0.72rem;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Messages ── */
        .chat-messages {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: fadeUp 0.25s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        /* ✅ FIX: profile images load safely with fallback emoji */
        .avatar img {
            width: 28px; height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-content {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.55;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message-content {
            background: var(--user-bg);
            border-radius: 16px 16px 4px 16px;
            border: 1px solid #3a5c3e;
        }

        .bot .message-content {
            background: var(--bot-bg);
            border-radius: 16px 16px 16px 4px;
            border: 1px solid var(--border);
        }

        .message-time {
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 4px;
            padding: 0 4px;
        }

        .message-wrapper { display: flex; flex-direction: column; }
        .user .message-wrapper { align-items: flex-end; }
        .bot  .message-wrapper { align-items: flex-start; }

        /* ── Typing indicator ── */
        .typing-indicator .message-content {
            padding: 12px 16px;
        }

        .dots { display: flex; gap: 4px; align-items: center; height: 18px; }

        .dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.2s infinite ease-in-out;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Input area ── */
        .chat-input-container {
            height: var(--input-h);
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input::placeholder { color: var(--muted); }
        #user-input:focus { border-color: var(--accent2); }

        #send-button {
            width: 42px; height: 42px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        #send-button:hover:not(:disabled) { background: #82d985; transform: scale(1.05); }
        #send-button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }

        /* ── Welcome card ── */
        .welcome-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            margin: 8px 0;
        }

        .welcome-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .welcome-card p {
            color: var(--muted);
            font-size: 0.83rem;
            line-height: 1.5;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .chip {
            padding: 6px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .chip:hover { border-color: var(--accent); background: var(--user-bg); }

        @media (max-width: 480px) {
            body { padding: 0; }
            .chat-container { height: 100vh; max-height: none; border-radius: 0; }
        }
    </style>
</head>
<body>
<div class="chat-container">

    <div class="chat-header">
        <div class="header-avatar">🌿</div>
        <div class="header-info">
            <h1>Tour Lite Bot</h1>
            <span>Your travel companion</span>
        </div>
        <div class="status-dot"></div>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="welcome-card">
            <h2>Welcome, Traveller! ✈️</h2>
            <p>Ask me anything about destinations, itineraries, travel tips, budgets, or local experiences.</p>
            <div class="suggestion-chips">
                <div class="chip" onclick="sendChip(this)">Best places in India 🇮🇳</div>
                <div class="chip" onclick="sendChip(this)">Budget trip to Goa</div>
                <div class="chip" onclick="sendChip(this)">3-day Manali itinerary</div>
                <div class="chip" onclick="sendChip(this)">Visa tips for Europe</div>
            </div>
        </div>
    </div>

    <div class="chat-input-container">
        <input type="text" id="user-input" placeholder="Ask about destinations, tours, tips…" autocomplete="off">
        <button id="send-button">➤</button>
    </div>

</div>

<script>
    // ✅ SWITCHED TO GROQ API — Free, fast, no CORS issues
    // Get your free key at: https://console.groq.com/keys
    const API_KEY = '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';
    const API_URL = 'https://api.groq.com/openai/v1/chat/completions';

    const chatMessages = document.getElementById('chat-messages');
    const userInput    = document.getElementById('user-input');
    const sendButton   = document.getElementById('send-button');

    // Conversation history — Groq uses OpenAI format: {role, content}
    const conversationHistory = [];

    // System prompt — travel focused
    const SYSTEM_PROMPT = `You are Tour Lite Bot, a friendly and knowledgeable travel assistant.
You help users plan trips, discover destinations, create itineraries, find budget tips,
understand visa requirements, and explore local cultures and cuisines.
Keep responses concise, friendly, and practical. Use emojis sparingly to make replies feel warm.
If a question is completely unrelated to travel or tourism, politely redirect back to travel topics.
Always tailor suggestions to the user's budget and preferences when mentioned.`;

    async function generateResponse(userMessage) {
        // Groq uses {role: "user", content: "..."} format
        conversationHistory.push({ role: "user", content: userMessage });

        let response;
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 15000);

            response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`   // Groq uses Bearer token
                },
                signal: controller.signal,
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',      // Free Groq model
                    messages: [
                        { role: 'system', content: SYSTEM_PROMPT },
                        ...conversationHistory
                    ],
                    temperature: 0.7,
                    max_tokens: 1024
                })
            });
            clearTimeout(timeout);
        } catch (err) {
            conversationHistory.pop();
            if (err.name === 'AbortError') throw new Error('Request timed out. Check your internet.');
            throw new Error('Network error: Could not reach Groq API. Check your connection.');
        }

        if (!response.ok) {
            conversationHistory.pop();
            let errMsg = 'API request failed';
            try {
                const err = await response.json();
                errMsg = err.error?.message || errMsg;
                if (response.status === 401) errMsg = 'Invalid Groq API key. Get one at console.groq.com/keys';
                if (response.status === 429) errMsg = 'Rate limit reached. Please wait a moment.';
                if (response.status === 503) errMsg = 'Groq API is temporarily unavailable.';
            } catch(e) {}
            throw new Error(errMsg);
        }

        const data = await response.json();
        const botReply = data.choices?.[0]?.message?.content || 'Sorry, I could not generate a response.';
        conversationHistory.push({ role: 'assistant', content: botReply });
        return botReply;
    }

    function cleanMarkdown(text) {
        return text
            .replace(/#{1,6}\s?/g, '')
            .replace(/\*\*(.*?)\*\*/g, '$1')
            .replace(/\*(.*?)\*/g, '$1')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ✅ FIX 5: Avatar uses emoji fallback — no broken image paths
    function addMessage(message, isUser) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('message', isUser ? 'user' : 'bot');

        const avatar = document.createElement('div');
        avatar.classList.add('avatar');
        avatar.textContent = isUser ? '🧑' : '🌿';

        const msgWrapper = document.createElement('div');
        msgWrapper.classList.add('message-wrapper');

        const content = document.createElement('div');
        content.classList.add('message-content');
        content.textContent = message;

        const time = document.createElement('div');
        time.classList.add('message-time');
        time.textContent = getTime();

        msgWrapper.appendChild(content);
        msgWrapper.appendChild(time);
        wrapper.appendChild(avatar);
        wrapper.appendChild(msgWrapper);

        chatMessages.appendChild(wrapper);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return wrapper;
    }

    // ✅ FIX 6: Typing indicator while waiting for API response
    function showTyping() {
        const wrapper = document.createElement('div');
        wrapper.classList.add('message', 'bot', 'typing-indicator');
        wrapper.id = 'typing';

        const avatar = document.createElement('div');
        avatar.classList.add('avatar');
        avatar.textContent = '🌿';

        const content = document.createElement('div');
        content.classList.add('message-content');
        content.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

        wrapper.appendChild(avatar);
        wrapper.appendChild(content);
        chatMessages.appendChild(wrapper);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    async function handleUserInput() {
        const userMessage = userInput.value.trim();
        if (!userMessage) return;

        addMessage(userMessage, true);
        userInput.value = '';
        sendButton.disabled = true;
        userInput.disabled = true;

        showTyping();

        try {
            const botMessage = await generateResponse(userMessage);
            hideTyping();
            addMessage(cleanMarkdown(botMessage), false);
        } catch (error) {
            hideTyping();
            console.error('Error:', error);
            addMessage('Sorry, something went wrong. Please try again. 🙏', false);
        } finally {
            sendButton.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    // ✅ FIX 7: Suggestion chip click handler
    function sendChip(el) {
        userInput.value = el.textContent.replace(/[^\w\s,]/g, '').trim();
        handleUserInput();
    }

    sendButton.addEventListener('click', handleUserInput);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleUserInput();
        }
    });
</script>
</body>
</html>
